services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: maison-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: gansou_db
    volumes:
      - mongodb_data_dev:/data/db
    ports:
      - "27017:27017"
    networks:
      - maison-network-dev

  # Mongo Express - Interface Web pour MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: maison-mongo-express-dev
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: Gansoukador@
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - maison-network-dev

  # Backend API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: maison-backend-dev
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/gansou_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - maison-network-dev

  # Frontend Vue.js
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: maison-frontend-dev
    restart: unless-stopped
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - maison-network-dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: maison-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - maison-network-dev

volumes:
  mongodb_data_dev:

networks:
  maison-network-dev:
    driver: bridge
