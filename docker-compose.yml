services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: maison-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: gansou_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - maison-network

  # Mongo Express - Interface Web pour MongoDB (optionnel en prod)
  mongo-express:
    image: mongo-express:latest
    container_name: maison-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASIC_AUTH_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASIC_AUTH_PASSWORD:-admin123}
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - maison-network
    profiles:
      - admin

  # Backend API
  backend:
    build: ./backend
    container_name: maison-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/gansou_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - maison-network

  # Frontend Vue.js
  frontend:
    build: ./frontend
    container_name: maison-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - maison-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: maison-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - maison-network

volumes:
  mongodb_data:

networks:
  maison-network:
    driver: bridge
